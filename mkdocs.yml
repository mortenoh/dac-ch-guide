site_name: DAC Climate and Health
site_description: Climate and health workshop guides for the DHIS2 Annual Conference
site_url: https://dhis2-chap.github.io/dac-guides
repo_url: https://github.com/dhis2-chap/dac-guides
repo_name: dhis2-chap/dac-guides

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Start here: index.md
  - Workshop:
      - 1. Prepare your machine: getting-started/prerequisites.md
      - 2. Start DHIS2: getting-started/start-dhis2.md
      - 3. Connect CHAP:
          - Choose a setup: getting-started/chap-setup.md
          - Quick setup (bundled): getting-started/add-chap-core.md
          - Development setup (source): getting-started/chap-core-from-source.md
      - 4. Install the apps: getting-started/install-apps.md
      - 5. Evaluate and predict:
          - Workflow and demo data: modelling/index.md
          - In the Modelling App: modelling/with-ui.md
          - Through the API: modelling/with-curl.md
      - 6. Configure a model: modelling/configured-models-curl.md
      - 7. Build a model:
          - Scaffold and run: modelling/chapkit-scaffold.md
          - Register with CHAP: modelling/chapkit-register.md
  - Reference:
      - Find and diagnose failures: operations/logs.md
      - Inspect the databases: operations/database.md
      - Back up and restore: operations/backup-restore.md
      - Upgrade or roll back CHAP: operations/upgrading.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: dhis2-chap
      repo: dac-guides
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dhis2-chap/dac-guides
