site_name: DAC Guides
site_description: Guides for the DHIS2 Annual Conference (DAC) and its climate track
site_url: https://dhis2-chap.github.io/dac-guides
repo_url: https://github.com/dhis2-chap/dac-guides
repo_name: dhis2-chap/dac-guides

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy

nav:
  - Overview & Setup: index.md
  - Getting Started:
      - Run DHIS2: getting-started/start-dhis2.md
      - Run chap-core:
          - Bundled images: getting-started/add-chap-core.md
          - From a clone: getting-started/chap-core-from-source.md
      - Install the apps: getting-started/install-apps.md
  - Evaluation & prediction:
      - Overview: modelling/index.md
      - With the UI: modelling/with-ui.md
      - With curl: modelling/with-curl.md
  - Configured models:
      - With curl: modelling/configured-models-curl.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: dhis2-chap
      repo: dac-guides
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dhis2-chap/dac-guides
